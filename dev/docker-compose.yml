services:
  openclaw:
    image: ghcr.io/${GITHUB_USERNAME:-your-username}/openclaw-ollama-image-dev:latest
    restart: unless-stopped
    environment:
      # GitHub (필수 — clone에 필요)
      - GITHUB_USERNAME=${GITHUB_USERNAME}
      - GITHUB_EMAIL=${GITHUB_EMAIL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # Ollama 모델 (선택)
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3-coder:32b}
      # Telegram (필수)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # Google OAuth (필수)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      # 클론할 레포 (선택 — 기본값: https://github.com/$GITHUB_USERNAME/openclaw-ollama-dev.git)
      - OPENCLAW_DEV_REPO=${OPENCLAW_DEV_REPO:-}
    volumes:
      # 모델 캐시 — 재시작 시 재다운로드 방지
      - ollama-models:/root/.ollama
      # 로컬 코드 마운트 옵션 (개발 시 활성화)
      # - ./openclaw-ollama-dev:/workspace/openclaw-ollama-dev
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama-models:
